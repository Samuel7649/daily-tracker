<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Productivity Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>Daily Productivity Tracker</h1>
        <p id="status" class="status"></p>
      </div>
      <div class="date-box">
        <span>Today</span>
        <strong id="todayDate"></strong>
      </div>
    </header>

    <section class="card controls">
      <h2>Add Task</h2>
      <form id="taskForm" class="task-form">
        <input type="text" id="taskName" placeholder="Task name" required />
        
        <select id="taskCategory">
          <option value="Health">Health</option>
          <option value="Study">Study</option>
          <option value="Work">Work</option>
          <option value="Personal">Personal</option>
          <option value="Other">Other</option>
        </select>

        <select id="taskPriority">
          <option value="Low">Low Priority</option>
          <option value="Medium" selected>Medium Priority</option>
          <option value="High">High Priority</option>
        </select>

        <textarea id="taskNote" placeholder="Optional note..."></textarea>

        <button type="submit">Add Task</button>
      </form>
    </section>

    <section class="card stats">
      <h2>Progress</h2>

      <div class="progress">
        <div id="progressBar"></div>
      </div>
      <p id="progressText" class="progress-text"></p>

      <div class="stat-grid">
        <div class="stat-box">
          <span>Total</span>
          <strong id="totalTasks">0</strong>
        </div>
        <div class="stat-box">
          <span>Completed</span>
          <strong id="completedTasks">0</strong>
        </div>
        <div class="stat-box">
          <span>Remaining</span>
          <strong id="remainingTasks">0</strong>
        </div>
      </div>
    </section>

    <section class="card filters">
      <h2>Filter Tasks</h2>
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
    </section>

    <section class="card">
      <h2>Tasks</h2>
      <ul id="taskList" class="task-list"></ul>
      <p id="emptyMessage" class="empty-message">No tasks yet. Add one above.</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
